<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>プレビュー | 愛媛マンダリンパイレーツ テンプレート</title>
<style>body { margin: 0; }</style>
</head>
<body>
<div id="root"></div>
<script>
  // ?f=ファイル名 で表示対象を切り替え（既定は news-list.html）
  const file = new URLSearchParams(location.search).get('f') || 'news-list.html';
  fetch(file, { cache: 'no-store' })
    .then(r => r.text())
    .then(t => { document.getElementById('root').innerHTML = t; })
    .catch(() => { document.getElementById('root').textContent = file + ' を読み込めませんでした'; });
</script>
</body>
</html>
